<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Validation</title>
  <style>
    .container{
      width: 40%;
      margin: 40px auto;
      background-color:#ccc;
      padding: 10px;
    }
    h2{
      text-align: center;
    }
    .error{
      color:red;
    }
    table tr>td{
      padding: 10px;
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded",function(){
      document.getElementById("form1").addEventListener("submit",function(event){
        event.preventDefault();
      })
    })
    function validatePassword(){
      let password=document.getElementById("password").value;
      if(!password.trim() || password===""){
        document.getElementById("errpassword").textContent="Password is required";
        return false;
      }
      if(password.length<8){
         document.getElementById("errpassword").textContent="Password must be 8 characters long";
        return false;
      }
      if(!charBag(password,"123456789","!@#$%^&*()_")){
         document.getElementById("errpassword").textContent="Password must contain a digit, a special symbol and an Upper case letter";
        return false;
      }
    }
    function charBag(psdvlaue,bag1,bag2){
      let hasNumber=false,hasSymbol=false,hasCapitalLetter=false;
      for(let i=0;i<psdvlaue.length;i++){
        let c=psdvlaue.charAt(i);
          if(bag1.indexOf(c)>=0){
            hasNumber=true;
          }
          if(bag2.indexOf(c)>=0){
            hasSymbol=true;
          }
          if(c>='A' && c<='Z')
          {
            hasCapitalLetter=true;
          }
          if(hasNumber && hasSymbol && hasCapitalLetter){
            document.getElementById("errpassword").textContent="";
            return true;
          }
         
        // alert(c);
      }
      return false;
    }
  </script>
</head>
<body>
  <div class="container">
    <h2>Password Validation</h2>
    <form action="" method="post" id="form1" onsubmit="return validatePassword();">
      <table>
        <tr>
          <td><label for="username">Enter your Username</label></td>
          <td>
            <input type="text"  id="username">
          </td>
        </tr>
        <tr>
          <td><label for="password">Enter your password</label></td>
          <td>
            <input type="password"  id="password">
            <span id="errpassword" class="error"></span>
          </td>
        </tr>
        <tr>
          <td colspan="2">
            <input type="submit" value="Submit">
          </td>
        </tr>
      </table>
    </form>
  </div>
</body>
</html>
